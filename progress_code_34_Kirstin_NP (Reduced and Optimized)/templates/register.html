<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Register Student</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>

:root {
  --primary: #2563eb;
  --primary-dark: #1e40af;
  --bg-body: #f8fafc;
  --surface: #ffffff;
  --text-main: #0f172a;
  --text-sub: #64748b;
  --border: #e2e8f0;
  --shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1), 0 2px 4px -2px rgb(0 0 0 / 0.1);
  --radius: 16px;
}

* { box-sizing: border-box; }

body {
  font-family: 'Poppins', sans-serif;
  background: var(--bg-body);
  color: var(--text-main);
  margin: 0;
  padding: 40px 20px;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
}

/* BACK BUTTON */
.back-wrapper {
  width: 100%;
  max-width: 460px;
  margin-bottom: 16px;
}

.btn-back {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  background: var(--primary);
  color: white;
  text-decoration: none;
  padding: 8px 18px;
  border-radius: 8px;
  font-size: 0.88rem;
  font-weight: 600;
  transition: all 0.2s ease;
  box-shadow: 0 2px 4px rgba(37,99,235,0.25);
}

.btn-back:hover {
  background: var(--primary-dark);
  transform: translateY(-2px);
  box-shadow: 0 4px 8px rgba(37,99,235,0.3);
}

/* CARD */
.container {
  background: var(--surface);
  width: 100%;
  max-width: 460px;
  border-radius: var(--radius);
  box-shadow: var(--shadow);
  padding: 2.5rem;
  border: 1px solid var(--border);
  animation: fadeIn 0.4s ease-out;
}

@keyframes fadeIn {
  from { opacity: 0; transform: translateY(10px); }
  to   { opacity: 1; transform: translateY(0); }
}

h2 {
  text-align: center;
  font-size: 1.5rem;
  font-weight: 600;
  color: var(--text-main);
  margin: 0 0 1.75rem 0;
}

/* FORM */
.form-group {
  margin-bottom: 1.1rem;
}

label {
  display: block;
  margin-bottom: 0.4rem;
  font-size: 0.9rem;
  font-weight: 500;
  color: var(--text-main);
}

input[type="text"] {
  width: 100%;
  padding: 0.75rem 1rem;
  border: 1px solid var(--border);
  border-radius: 8px;
  font-family: inherit;
  font-size: 0.95rem;
  color: var(--text-main);
  background: var(--bg-body);
  transition: border-color 0.2s, box-shadow 0.2s;
  outline: none;
}

input[type="text"]:focus {
  border-color: var(--primary);
  box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.1);
  background: var(--surface);
}

input[type="text"]::placeholder {
  color: #cbd5e1;
}

/* SUBJECTS */
.subject-container {
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 12px;
  height: 150px;
  overflow-y: auto;
  background: var(--bg-body);
  transition: border-color 0.2s, box-shadow 0.2s;
}

.subject-container:focus-within {
  border-color: var(--primary);
  box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.1);
}

.subject-item {
  display: flex;
  align-items: center;
  margin-bottom: 8px;
}

.subject-item input[type="checkbox"] {
  width: auto;
  margin-right: 8px;
  cursor: pointer;
  accent-color: var(--primary);
}

.subject-item label {
  margin: 0;
  font-size: 0.88rem;
  font-weight: 400;
  color: var(--text-sub);
  cursor: pointer;
}

.note {
  font-size: 0.8rem;
  color: var(--text-sub);
  margin-top: 6px;
}

/* ERROR */
.error {
  background: #fef2f2;
  border: 1px solid #fecaca;
  color: #dc2626;
  border-radius: 8px;
  padding: 10px 14px;
  font-size: 0.88rem;
  font-weight: 500;
  text-align: center;
  margin-bottom: 1.25rem;
}

/* SUBMIT */
button[type="submit"] {
  width: 100%;
  padding: 0.85rem;
  background: var(--primary);
  color: white;
  border: none;
  border-radius: 8px;
  font-family: inherit;
  font-size: 1rem;
  font-weight: 600;
  cursor: pointer;
  margin-top: 1.25rem;
  transition: background 0.2s, transform 0.2s, box-shadow 0.2s;
  box-shadow: 0 4px 6px rgba(37, 99, 235, 0.25);
}

button[type="submit"]:hover {
  background: var(--primary-dark);
  transform: translateY(-2px);
  box-shadow: 0 6px 12px rgba(37, 99, 235, 0.3);
}

button[type="submit"]:active {
  transform: translateY(0);
}

</style>
</head>
<body>

<div class="back-wrapper">
  <a href="/back_to_dashboard" class="btn-back">Back to Dashboard</a>
</div>

<div class="container">

  <h2>Register Student</h2>

  {% if error %}
  <div class="error">{{ error }}</div>
  {% endif %}

  <form method="POST" action="{{ url_for('register') }}">

    <div class="form-group">
      <label for="student_id">Student ID</label>
      <input type="text" id="student_id" name="student_id" placeholder="Enter student ID" required>
    </div>

    <div class="form-group">
      <label for="name">Full Name</label>
      <input type="text" id="name" name="name" placeholder="Enter full name" required>
    </div>

    <div class="form-group">
      <label for="course">Course</label>
      <input type="text" id="course" name="course" placeholder="Enter course" required>
    </div>

    <div class="form-group">
      <label>Subjects</label>
      <div class="subject-container">
        {% for s in subjects_list %}
        <div class="subject-item">
          <input type="checkbox"
                 name="subjects[]"
                 value="{{ s[0] }}"
                 id="subject_{{ s[0] }}">
          <label for="subject_{{ s[0] }}">
            {{ s[1] }} ({{ s[2] }}) - {{ s[3] }}
          </label>
        </div>
        {% endfor %}
      </div>
      <p class="note">Select one or more subjects.</p>
    </div>

    <button type="submit">Next: Capture Face</button>

  </form>

</div>

</body>
</html>
