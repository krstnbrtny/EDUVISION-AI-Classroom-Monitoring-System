<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Visitor Management</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>
/* =========================================
   GLOBAL VARIABLES & RESET
   ========================================= */
:root {
  --primary:      #2563eb;
  --primary-dark: #1e40af;
  --bg-body:      #f8fafc;
  --surface:      #ffffff;
  --text-main:    #0f172a;
  --text-sub:     #64748b;
  --border:       #e2e8f0;
  --shadow:       0 4px 6px -1px rgb(0 0 0 / 0.08), 0 2px 4px -2px rgb(0 0 0 / 0.08);
  --radius:       16px;
  --radius-sm:    10px;
  --danger:       #ef4444;
  --danger-dark:  #dc2626;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'Poppins', sans-serif;
  background: var(--bg-body);
  color: var(--text-main);
  min-height: 100vh;
  padding: 36px 32px;
  animation: fadeIn 0.4s ease-out;
}

@keyframes fadeIn {
  from { opacity: 0; transform: translateY(10px); }
  to   { opacity: 1; transform: translateY(0); }
}

/* =========================================
   CONTAINER
   ========================================= */
.container {
  max-width: 1100px;
  margin: 0 auto;
  background: var(--surface);
  padding: 32px;
  border-radius: var(--radius);
  border: 1px solid var(--border);
  box-shadow: var(--shadow);
}

/* =========================================
   HEADER
   ========================================= */
.page-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 28px;
  flex-wrap: wrap;
  gap: 12px;
}

.page-header h2 {
  font-size: 1.4rem;
  font-weight: 600;
  color: var(--text-main);
  letter-spacing: -0.3px;
}

.page-header h2 span { color: var(--primary); }

.back-btn {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 10px 20px;
  background: var(--primary);
  color: white;
  border: none;
  border-radius: var(--radius-sm);
  text-decoration: none;
  font-family: 'Poppins', sans-serif;
  font-size: 0.88rem;
  font-weight: 500;
  transition: background 0.2s, transform 0.15s;
}

.back-btn:hover {
  background: var(--primary-dark);
  transform: translateY(-1px);
}

/* =========================================
   TABLE
   ========================================= */
.table-wrapper {
  overflow-x: auto;
  border-radius: var(--radius-sm);
  border: 1px solid var(--border);
}

table {
  width: 100%;
  border-collapse: collapse;
  font-size: 0.9rem;
}

thead th {
  background: #0f172a;
  color: #f8fafc;
  padding: 14px 16px;
  text-align: left;
  font-weight: 500;
  font-size: 0.82rem;
  text-transform: uppercase;
  letter-spacing: 0.5px;
  white-space: nowrap;
}

thead th:first-child { border-radius: var(--radius-sm) 0 0 0; }
thead th:last-child  { border-radius: 0 var(--radius-sm) 0 0; }

tbody td {
  padding: 14px 16px;
  border-bottom: 1px solid var(--border);
  color: var(--text-main);
  vertical-align: middle;
}

tbody tr:last-child td { border-bottom: none; }
tbody tr:hover { background: #f8fafc; }

/* Type badge */
.type-badge {
  display: inline-block;
  background: #eff6ff;
  color: var(--primary);
  border: 1px solid #bfdbfe;
  padding: 3px 12px;
  border-radius: 20px;
  font-size: 0.78rem;
  font-weight: 500;
}

/* Countdown */
.countdown {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  font-size: 0.85rem;
  font-weight: 500;
  color: var(--text-main);
  background: #f1f5f9;
  border: 1px solid var(--border);
  padding: 4px 12px;
  border-radius: 20px;
  white-space: nowrap;
  font-variant-numeric: tabular-nums;
}

.countdown.expired {
  background: #fef2f2;
  border-color: #fecaca;
  color: var(--danger);
}

/* =========================================
   ACTION BUTTONS
   ========================================= */
.actions {
  display: flex;
  gap: 8px;
  align-items: center;
}

.edit-btn, .delete-btn {
  padding: 6px 16px;
  border: none;
  border-radius: 20px;
  font-family: 'Poppins', sans-serif;
  font-size: 0.8rem;
  font-weight: 500;
  cursor: pointer;
  transition: opacity 0.2s, transform 0.15s;
}

.edit-btn   { background: var(--primary); color: white; }
.delete-btn { background: var(--danger);  color: white; }
.edit-btn:hover, .delete-btn:hover { opacity: 0.88; transform: translateY(-1px); }

/* =========================================
   MODAL
   ========================================= */
.modal {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(15, 23, 42, 0.45);
  backdrop-filter: blur(2px);
  z-index: 100;
  justify-content: center;
  align-items: center;
  padding: 20px;
}

.modal.open { display: flex; }

.modal-content {
  background: var(--surface);
  padding: 32px;
  width: 460px;
  max-width: 95vw;
  border-radius: var(--radius);
  border: 1px solid var(--border);
  box-shadow: 0 20px 40px -10px rgb(0 0 0 / 0.2);
  animation: modalIn 0.25s ease-out;
}

@keyframes modalIn {
  from { opacity: 0; transform: scale(0.96) translateY(8px); }
  to   { opacity: 1; transform: scale(1) translateY(0); }
}

.modal-header { text-align: center; margin-bottom: 24px; }
.modal-header h3 { font-size: 1.2rem; font-weight: 600; color: var(--text-main); }
.modal-header p  { font-size: 0.85rem; color: var(--text-sub); margin-top: 4px; }

.form-group { margin-bottom: 16px; }
.form-group label {
  display: block;
  font-size: 0.85rem;
  font-weight: 500;
  color: var(--text-main);
  margin-bottom: 6px;
}

.form-group input[type="text"] {
  width: 100%;
  padding: 10px 14px;
  font-family: 'Poppins', sans-serif;
  font-size: 0.9rem;
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  color: var(--text-main);
  outline: none;
  transition: border-color 0.2s, box-shadow 0.2s;
}

.form-group input[type="text"]:focus {
  border-color: var(--primary);
  box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.1);
}

.modal-actions { display: flex; flex-direction: column; gap: 10px; margin-top: 20px; }

.save-btn, .cancel-btn {
  width: 100%;
  padding: 11px;
  font-family: 'Poppins', sans-serif;
  font-size: 0.95rem;
  font-weight: 500;
  border: none;
  border-radius: var(--radius-sm);
  cursor: pointer;
  transition: background 0.2s, transform 0.15s;
}

.save-btn { background: var(--primary); color: white; }
.save-btn:hover { background: var(--primary-dark); transform: translateY(-1px); }
.cancel-btn { background: #f1f5f9; color: var(--text-sub); }
.cancel-btn:hover { background: #e2e8f0; }

/* =========================================
   RESPONSIVE
   ========================================= */
@media (max-width: 600px) {
  body { padding: 16px; }
  .container { padding: 20px 16px; }
  .page-header { flex-direction: column; align-items: flex-start; }
}
</style>
</head>

<body>
<div class="container">

  <!-- HEADER -->
  <div class="page-header">
    <h2>Visitor <span>Management</span></h2>
    <a href="/back_to_dashboard" class="back-btn">Back to Dashboard</a>
  </div>

  <!-- TABLE -->
  <div class="table-wrapper">
    <table>
      <thead>
        <tr>
          <th>ID</th>
          <th>Name</th>
          <th>Type</th>
          <th>Purpose</th>
          <th>Time Left</th>
          <th>Actions</th>
        </tr>
      </thead>
      <tbody>
        {% for v in visitors %}
        <tr>
          <td>{{ v[1] }}</td>
          <td>{{ v[2] }}</td>
          <td><span class="type-badge">{{ v[3] }}</span></td>
          <td>{{ v[4] }}</td>
          <td><span class="countdown" data-exp="{{ v[5] }}"></span></td>
          <td>
            <div class="actions">
              <button class="edit-btn" onclick="openEditModal('{{ v[1] }}','{{ v[2] }}','{{ v[3] }}','{{ v[4] }}')">Edit</button>
              <form method="POST" style="display:inline;">
                <input type="hidden" name="delete_id" value="{{ v[1] }}">
                <button class="delete-btn" onclick="return confirm('Delete this visitor?')">Delete</button>
              </form>
            </div>
          </td>
        </tr>
        {% endfor %}
      </tbody>
    </table>
  </div>

</div>

<!-- MODAL -->
<div id="editModal" class="modal">
  <div class="modal-content">
    <div class="modal-header">
      <h3>Edit Visitor</h3>
      <p>Update the visitor's information below</p>
    </div>
    <form method="POST" id="editForm">
      <input type="hidden" name="edit_id" id="edit_id">
      <div class="form-group">
        <label>Name</label>
        <input type="text" name="new_name" id="new_name" required>
      </div>
      <div class="form-group">
        <label>Type</label>
        <input type="text" name="new_type" id="new_type" required>
      </div>
      <div class="form-group">
        <label>Purpose</label>
        <input type="text" name="new_purpose" id="new_purpose" required>
      </div>
      <div class="modal-actions">
        <button type="submit" class="save-btn">Save Changes</button>
        <button type="button" class="cancel-btn" onclick="closeEditModal()">Cancel</button>
      </div>
    </form>
  </div>
</div>

<script>
function openEditModal(id, name, type, purpose) {
  document.getElementById("editModal").classList.add("open");
  document.getElementById("edit_id").value = id;
  document.getElementById("new_name").value = name;
  document.getElementById("new_type").value = type;
  document.getElementById("new_purpose").value = purpose;
}

function closeEditModal() {
  document.getElementById("editModal").classList.remove("open");
}

window.addEventListener("click", function(e) {
  const modal = document.getElementById("editModal");
  if (e.target === modal) closeEditModal();
});

function updateCountdown() {
  const now = new Date();
  document.querySelectorAll(".countdown").forEach(el => {
    const exp = new Date(el.dataset.exp.replace(" ", "T"));
    let diff = exp - now;

    if (diff <= 0) {
      el.textContent = "Expired";
      el.classList.add("expired");
      return;
    }

    const days    = Math.floor(diff / (1000 * 60 * 60 * 24)); diff -= days * 86400000;
    const hours   = Math.floor(diff / (1000 * 60 * 60));      diff -= hours * 3600000;
    const minutes = Math.floor(diff / (1000 * 60));           diff -= minutes * 60000;
    const seconds = Math.floor(diff / 1000);

    el.textContent = `${days}d ${hours}h ${minutes}m ${seconds}s`;
    el.classList.remove("expired");
  });
}

setInterval(updateCountdown, 1000);
updateCountdown();
</script>

</body>
</html>
